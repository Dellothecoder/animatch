    <!-- Structured Data — WebApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "url": "https://animatch.bolt.host",
      "description": "Personalized anime recommendations based on your MyAnimeList watch history",

      "operatingSystem": "Web",

        "@type": "Offer",

        "@type": "AggregateRating",

    <!-- Structured Data — FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How does AniMatch work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AniMatch connects to your MyAnimeList account, reads your watch history and ratings, and recommends anime you haven't seen yet based on your favourite genres and highest rated shows."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need an account to use AniMatch?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No account needed. Just enter your MyAnimeList username and get instant personalized recommendations."
          }
        },
        {
          "@type": "Question",
          "name": "Is AniMatch free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, AniMatch is completely free to use. Just enter your MAL username and get recommendations instantly."
          }
        },
        {
          "@type": "Question",
          "name": "What is MyAnimeList?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "MyAnimeList (MAL) is the world's largest anime and manga database where users track what they've watched and rate shows."
          }
        }
      ]
    }
